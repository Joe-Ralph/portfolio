<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Whoops</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Roboto:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0b0e;
            /* Deep dark background */
            font-family: 'Roboto', sans-serif;
            cursor: crosshair;
            /* Encourages interaction */
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
            /* Let clicks pass through to the canvas */
            color: white;
            mix-blend-mode: exclusion;
            /* Cool effect over particles */
        }

        h1 {
            font-family: 'Righteous', cursive;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            background: -webkit-linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(0, 255, 255, 0.3);
        }

        p {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #ccc;
            letter-spacing: 1px;
        }

        .cta {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <div class="content">
        <h1>404</h1>
        <p>Page not found. But hey, productivity was overrated anyway.</p>
        <div class="cta">Poke the background</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b0b0e, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Helper: Create Circle Texture
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }
        const circleTexture = createCircleTexture();

        // 2. COLORS
        const colors = [
            new THREE.Color('#00ffff'), // Cyan
            new THREE.Color('#ff00ff'), // Pink
            new THREE.Color('#00ccff')  // Light Blue
        ];

        // 3. AMBIENT PARTICLES
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 150;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.5, // Slightly larger to see the circle shape
            map: circleTexture,
            alphaTest: 0.1,
            color: 0xffffff,
            transparent: true,
            opacity: 0.6,
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // 4. INTERACTIVE BURST SYSTEM
        const explosions = [];
        let bounds = { halfWidth: 0, halfHeight: 0 };

        function updateBounds() {
            const vFov = camera.fov * Math.PI / 180;
            const height = 2 * Math.tan(vFov / 2) * camera.position.z;
            const width = height * camera.aspect;
            bounds.halfHeight = height / 2;
            bounds.halfWidth = width / 2;
        }
        updateBounds();

        class Explosion {
            constructor(x, y) {
                this.geometry = new THREE.BufferGeometry();
                this.count = 60;
                this.positions = new Float32Array(this.count * 3);
                this.velocities = [];
                this.colors = new Float32Array(this.count * 3);

                for (let i = 0; i < this.count; i++) {
                    this.positions[i * 3] = x;
                    this.positions[i * 3 + 1] = y;
                    this.positions[i * 3 + 2] = 0;

                    const angle = Math.random() * Math.PI * 2;
                    // Faster speed to ensure they hit edges
                    const speed = Math.random() * 0.8 + 0.4;
                    this.velocities.push({
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed,
                        z: 0 // Keep strictly 2D for predictable bouncing
                    });

                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.colors[i * 3] = color.r;
                    this.colors[i * 3 + 1] = color.g;
                    this.colors[i * 3 + 2] = color.b;
                }

                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));

                this.material = new THREE.PointsMaterial({
                    size: 1.2,
                    map: circleTexture,
                    alphaTest: 0.1,
                    vertexColors: true,
                    transparent: true,
                    opacity: 1
                });

                this.mesh = new THREE.Points(this.geometry, this.material);
                scene.add(this.mesh);

                this.age = 0;
                this.maxAge = 180; // Live longer (3 seconds) to bounce around
            }

            update() {
                this.age++;
                const positions = this.geometry.attributes.position.array;

                for (let i = 0; i < this.count; i++) {
                    // Move
                    positions[i * 3] += this.velocities[i].x;
                    positions[i * 3 + 1] += this.velocities[i].y;

                    // Bounce Logic
                    const px = positions[i * 3];
                    const py = positions[i * 3 + 1];

                    // Bounce X
                    if (px > bounds.halfWidth) {
                        positions[i * 3] = bounds.halfWidth;
                        this.velocities[i].x *= -1;
                    } else if (px < -bounds.halfWidth) {
                        positions[i * 3] = -bounds.halfWidth;
                        this.velocities[i].x *= -1;
                    }

                    // Bounce Y
                    if (py > bounds.halfHeight) {
                        positions[i * 3 + 1] = bounds.halfHeight;
                        this.velocities[i].y *= -1;
                    } else if (py < -bounds.halfHeight) {
                        positions[i * 3 + 1] = -bounds.halfHeight;
                        this.velocities[i].y *= -1;
                    }

                    // Friction (Very low to keep them moving)
                    this.velocities[i].x *= 0.995;
                    this.velocities[i].y *= 0.995;
                }

                this.geometry.attributes.position.needsUpdate = true;

                // Fade out near end of life
                if (this.age > this.maxAge - 60) {
                    this.material.opacity = (this.maxAge - this.age) / 60;
                }
            }

            isDead() {
                return this.age > this.maxAge;
            }

            dispose() {
                scene.remove(this.mesh);
                this.geometry.dispose();
                this.material.dispose();
            }
        }

        // 5. INPUT HANDLING
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('mousedown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeZ, target);

            explosions.push(new Explosion(target.x, target.y));
        });

        let mouseX = 0;
        let mouseY = 0;
        window.addEventListener('mousemove', (event) => {
            mouseX = event.clientX;
            mouseY = event.clientY;
        });

        // 6. ANIMATION LOOP
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Rotate background particles slowly
            particlesMesh.rotation.y = mouseY * 0.0001;
            particlesMesh.rotation.x = mouseX * 0.0001;

            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].update();
                if (explosions[i].isDead()) {
                    explosions[i].dispose();
                    explosions.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBounds(); // Recalculate bounce edges
        });

    </script>
</body>

</html>
